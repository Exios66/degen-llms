name: Deploy GitHub Pages

# The live site is served from the gh-pages branch (/docs) via legacy Pages
# build. The github-pages Actions environment only allows gh-pages/pages
# branches, so we sync docs/ from main onto gh-pages instead of using
# actions/deploy-pages from main.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/deploy-gh-pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-sync
  cancel-in-progress: false

jobs:
  sync-gh-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync docs to gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages
          git checkout gh-pages
          git checkout origin/main -- docs/
          if git diff --quiet; then
            echo "docs/ already up to date on gh-pages"
          else
            git add docs/
            git commit -m "Sync gh-pages/docs/ from main (${GITHUB_SHA:0:7})"
            git push origin gh-pages
          fi

      - name: Site URL
        run: echo "Live at https://exios66.github.io/degen-llms/"
