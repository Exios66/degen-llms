<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="The Mandalay Bay — a choose-your-adventure digital casino. Play blackjack, slots, and the sports book in your browser with a unified chip economy.">
  <meta name="theme-color" content="#0a0e14">
  <meta property="og:title" content="The Mandalay Bay — Digital Casino">
  <meta property="og:description" content="Blackjack, slots, and sports book — terminal-style digital casino in your browser.">
  <meta property="og:type" content="website">
  <title>The Mandalay Bay — Digital Casino</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/casino.css">
</head>
<body>
  <div id="app" aria-live="polite">
    <noscript>
      <div class="loading-screen">
        <div class="banner"><h1>The Mandalay Bay</h1></div>
        <p style="color:#f07178;font-family:monospace;padding:1rem;text-align:center;">
          JavaScript is required. Enable it to play blackjack, slots, and the sports book.
        </p>
      </div>
    </noscript>
    <div class="loading-screen" id="boot-loader">
      <div class="banner"><h1>The Mandalay Bay</h1></div>
      <p class="subtitle">Digital Casino</p>
      <p class="dim loading-pulse">Opening the floor&hellip;</p>
      <p class="footer-note">Blackjack &middot; Slots &middot; Sports Book</p>
    </div>
  </div>
  <script type="module" src="js/app.js"></script>
  <script>
    window.addEventListener("error", function (e) {
      var app = document.getElementById("app");
      if (!app || app.dataset.bootError) return;
      app.dataset.bootError = "1";
      app.innerHTML = "<div class=\"loading-screen\"><div class=\"banner\"><h1>The Mandalay Bay</h1></div>"
        + "<p class=\"error\">Could not start the casino: " + (e.message || "unknown error") + "</p>"
        + "<p class=\"dim\">Try a hard refresh. If this persists, check the browser console.</p></div>";
    });
  </script>
</body>
</html>
